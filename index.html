<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream Puzzle: Evolved</title>
    <style>
        :root {
            --primary: #38bdf8;
            --success: #34d399;
            --bg-dark: rgba(15, 23, 42, 0.8);
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            background: url('https://i.postimg.cc/wxXP29s1/Woode-texturedbackground.png');
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.7));
            z-index: -1;
        }

        /* Level Select Screen */
        #level-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .level-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px;
        }

        .level-card {
            width: 140px; height: 140px; background: #1e293b; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; border: 2px solid #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .level-card:hover:not(.locked) { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .level-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .level-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .lock-icon { position: absolute; font-size: 32px; z-index: 2; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* Stats & UI */
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .stats-box { 
            background: var(--glass); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; flex: 1; backdrop-filter: blur(4px);
        }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-weight: 800; color: var(--primary); font-size: 20px; }

        /* Game Board */
        #board-container { position: relative; width: 90vw; max-width: 400px; aspect-ratio: 1/1; }
        
        #board { 
            display: grid; gap: 4px; width: 100%; height: 100%;
            background: var(--glass); padding: 8px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.1);
            box-sizing: border-box; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #board.won { gap: 0; padding: 0; border-color: var(--success); transform: scale(1.02); }

        .tile { 
            width: 100%; height: 100%; border-radius: 8px; cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s, border-radius 0.5s;
            position: relative; overflow: hidden;
            background-repeat: no-repeat;
        }

        .tile::after {
            content: ""; position: absolute; inset: 0; 
            background: rgba(255,255,255,0); transition: 0.3s;
        }

        /* Indicator for correct spot */
        .tile.correct-spot { border: 2px solid rgba(52, 211, 153, 0.4); }
        .tile.correct-spot::after { background: rgba(52, 211, 153, 0.1); }

        .selected { transform: scale(0.9) rotate(2deg); z-index: 10; box-shadow: 0 0 25px var(--primary); border: 3px solid white; }

        /* Controls */
        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button, select { 
            background: #334155; border: 1px solid rgba(255,255,255,0.1); padding: 12px 18px; border-radius: 10px; 
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        #peek-btn { background: #6366f1; }
        #next-btn { background: var(--success); display: none; animation: bounce 2s infinite; }
        
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        #win-banner { 
            text-align: center; margin: 15px 0; display: none;
            background: linear-gradient(to right, #065f46, #047857); 
            padding: 15px; border-radius: 12px; width: 90vw; max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="level-menu">
        <h1 style="color: var(--primary); margin-bottom: 5px; font-size: 32px; letter-spacing: 4px; font-weight: 900;">DREAM PUZZLE</h1>
        <p style="color: #94a3b8; margin-bottom: 30px; font-style: italic;">"The architect of your own reality"</p>
        <div id="level-grid" class="level-grid"></div>
        <button onclick="resetProgress()" style="margin-top: 40px; font-size: 11px; opacity: 0.4; background: transparent;">Factory Reset Dreams</button>
    </div>

    <div class="header">
        <div class="stats-box"><span class="label">Dream</span><span id="lvl-num" class="value">1</span></div>
        <div class="stats-box"><span class="label">Time</span><span id="time-num" class="value">00:00</span></div>
        <div class="stats-box"><span class="label">Moves</span><span id="move-num" class="value">0</span></div>
    </div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="win-banner">
        <div style="font-size: 20px; font-weight: 900; letter-spacing: 1px;">✨ VISION REVEALED ✨</div>
        <div id="rank-text" style="font-size: 14px; color: #a7f3d0; margin-top: 5px;">Rank: Master</div>
    </div>

    <div class="controls">
        <select id="diff-select" onchange="setDifficulty(this.value)">
            <option value="3">Easy (3x3)</option>
            <option value="4" selected>Medium (4x4)</option>
            <option value="5">Hard (5x5)</option>
        </select>
        <button id="peek-btn" onmousedown="showHint(true)" onmouseup="showHint(false)" ontouchstart="showHint(true)" ontouchend="showHint(false)">👁️ Peek</button>
        <button onclick="goHome()">🏠 Menu</button>
        <button onclick="startLevel()">🔄 Restart</button>
        <button id="next-btn" onclick="nextLevel()">Next Dream ➡️</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const lvlNum = document.getElementById('lvl-num');
        const moveNum = document.getElementById('move-num');
        const timeNum = document.getElementById('time-num');
        const nextBtn = document.getElementById('next-btn');
        const winBanner = document.getElementById('win-banner');
        const rankText = document.getElementById('rank-text');

        const levels = [
            'https://i.postimg.cc/G2QZ2m2J/dream.png',
            'https://i.postimg.cc/jjvgCG5b/Dream-2.png',
            'https://i.postimg.cc/2jxfHGrw/dream3.png',
            'https://i.postimg.cc/FKR0dDGy/dream4.png'
        ];

        let currentLevel = 0;
        let gridSize = 4;
        let moves = 0;
        let timer = 0;
        let timerInterval;
        let firstTile = null;
        let isWon = false;
        let unlockedLevel = parseInt(localStorage.getItem('dreamPuzzleUnlocked')) || 0;

        function initMenu() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            document.getElementById('level-menu').style.display = 'flex';
            levels.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = `level-card ${index > unlockedLevel ? 'locked' : ''}`;
                if (index <= unlockedLevel) {
                    card.innerHTML = `<img src="${img}"><span style="position:absolute; bottom:10px; background:rgba(0,0,0,0.7); padding:4px 10px; border-radius:20px; font-size:10px;">DREAM ${index+1}</span>`;
                    card.onclick = () => { currentLevel = index; startLevel(); };
                } else {
                    card.innerHTML = `<span class="lock-icon">🔒</span><img src="${img}" style="filter: blur(10px)">`;
                }
                grid.appendChild(card);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timer = 0;
            timerInterval = setInterval(() => {
                timer++;
                const mins = Math.floor(timer / 60).toString().padStart(2, '0');
                const secs = (timer % 60).toString().padStart(2, '0');
                timeNum.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function setDifficulty(val) {
            gridSize = parseInt(val);
            startLevel();
        }

        function startLevel() {
            document.getElementById('level-menu').style.display = 'none';
            board.innerHTML = '';
            board.classList.remove('won');
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            moves = 0;
            isWon = false;
            moveNum.innerText = moves;
            lvlNum.innerText = currentLevel + 1;
            nextBtn.style.display = 'none';
            winBanner.style.display = 'none';

            startTimer();

            const totalTiles = gridSize * gridSize;
            let pieces = Array.from({length: totalTiles}, (_, i) => i).sort(() => Math.random() - 0.5);

            pieces.forEach(idx => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.backgroundImage = `url('${levels[currentLevel]}')`;
                tile.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
                
                updateTileVisuals(tile, idx);

                tile.addEventListener('pointerdown', () => handleTileClick(tile));
                board.appendChild(tile);
            });
            checkCorrectness();
        }

        function handleTileClick(tile) {
            if (isWon) return;
            if (!firstTile) {
                firstTile = tile;
                tile.classList.add('selected');
            } else if (firstTile === tile) {
                tile.classList.remove('selected');
                firstTile = null;
            } else {
                // Swap logic
                const tempIdx = tile.dataset.idx;
                updateTileVisuals(tile, firstTile.dataset.idx);
                updateTileVisuals(firstTile, tempIdx);
                
                firstTile.classList.remove('selected');
                firstTile = null;
                moves++;
                moveNum.innerText = moves;
                checkCorrectness();
                checkWin();
            }
        }

        function updateTileVisuals(el, i) {
            el.dataset.idx = i;
            const percent = 100 / (gridSize - 1);
            const x = (i % gridSize) * percent;
            const y = Math.floor(i / gridSize) * percent;
            el.style.backgroundPosition = `${x}% ${y}%`;
        }

        function checkCorrectness() {
            const tiles = Array.from(board.children);
            tiles.forEach((tile, index) => {
                if (parseInt(tile.dataset.idx) === index) {
                    tile.classList.add('correct-spot');
                } else {
                    tile.classList.remove('correct-spot');
                }
            });
        }

        function showHint(show) {
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach((t, i) => {
                t.style.backgroundImage = show ? `none` : `url('${levels[currentLevel]}')`;
                t.style.backgroundColor = show ? '#1e293b' : 'transparent';
                t.innerHTML = show ? `<div style="display:flex; justify-content:center; align-items:center; height:100%; font-weight:bold; color:var(--primary)">${parseInt(t.dataset.idx) + 1}</div>` : '';
            });
        }

        function checkWin() {
            const tiles = document.querySelectorAll('.tile');
            let correct = 0;
            tiles.forEach((t, i) => { if(parseInt(t.dataset.idx) === i) correct++; });
            
            if (correct === gridSize * gridSize) {
                isWon = true;
                clearInterval(timerInterval);
                board.classList.add('won');
                
                if (currentLevel === unlockedLevel && unlockedLevel < levels.length - 1) {
                    unlockedLevel++;
                    localStorage.setItem('dreamPuzzleUnlocked', unlockedLevel);
                }

                winBanner.style.display = 'block';
                calculateRank();
                if (currentLevel < levels.length - 1) nextBtn.style.display = 'block';
            }
        }

        function calculateRank() {
            const par = gridSize * gridSize * 3;
            if (moves < par && timer < 60) rankText.innerText = "Rank: ⚡ Godlike Visionary";
            else if (moves < par * 1.5) rankText.innerText = "Rank: 🏗️ Master Architect";
            else rankText.innerText = "Rank: 🌙 Persistent Dreamer";
        }

        function nextLevel() { currentLevel++; startLevel(); }
        function goHome() { clearInterval(timerInterval); initMenu(); }
        function resetProgress() {
            if(confirm("This will erase all your journey data. Are you sure?")) {
                localStorage.removeItem('dreamPuzzleUnlocked');
                unlockedLevel = 0;
                initMenu();
            }
        }

        initMenu();
    </script>
</body>
</html>
