<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream Puzzle: Evolved</title>
    <style>
        :root {
            --primary: #38bdf8;
            --success: #34d399;
            --accent: #fbbf24;
            --bg-dark: rgba(15, 23, 42, 0.9);
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            background: url('https://i.postimg.cc/wxXP29s1/Woode-texturedbackground.png');
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.7));
            z-index: -1;
        }

        /* --- UI OVERLAYS --- */
        #level-menu, #ad-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }

        #level-menu { background: var(--bg-dark); }
        #ad-container { background: black; z-index: 200; display: none; }

        .ad-box { padding: 30px; border-radius: 20px; background: #0f172a; text-align: center; border: 1px solid #334155; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- LEVEL GRID --- */
        .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .level-card {
            width: 130px; height: 130px; background: #1e293b; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; border: 2px solid #334155;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .level-card:hover:not(.locked) { transform: translateY(-5px); border-color: var(--primary); }
        .level-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .level-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- GAME BOARD --- */
        .header { width: 100%; max-width: 400px; display: flex; gap: 8px; margin-bottom: 15px; }
        .stats-box { background: var(--glass); padding: 10px; border-radius: 12px; flex: 1; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; display: block; }
        .value { font-weight: 800; color: var(--primary); font-size: 18px; }

        #board { 
            display: grid; gap: 4px; width: 90vw; max-width: 400px; aspect-ratio: 1/1;
            background: var(--glass); padding: 8px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }
        #board.won { gap: 0; padding: 0; border-color: var(--success); }

        .tile { 
            width: 100%; height: 100%; border-radius: 6px; cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; background-repeat: no-repeat;
            position: relative;
        }
        .tile.correct-spot::after { content: "✓"; position: absolute; top: 2px; right: 4px; color: var(--success); font-size: 10px; font-weight: bold; opacity: 0.7; }
        .selected { transform: scale(0.9); z-index: 10; box-shadow: 0 0 20px var(--primary); border: 2px solid white; }

        /* --- CONTROLS --- */
        .controls { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        button, select { 
            background: #334155; border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; 
            color: white; font-weight: 600; cursor: pointer;
        }
        #ad-btn { background: var(--accent); color: #000; }
        #next-btn { background: var(--success); display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #win-banner { 
            text-align: center; margin: 15px 0; display: none;
            background: #065f46; padding: 12px; border-radius: 12px; width: 90vw; max-width: 380px;
        }
    </style>
</head>
<body>

    <div id="ad-container">
        <div class="ad-box">
            <div class="spinner"></div>
            <h2 style="color: var(--primary); margin: 0;">Dream Sponsor</h2>
            <p id="ad-timer-text" style="color: #94a3b8;">Focusing vision in 5s...</p>
        </div>
    </div>

    <div id="level-menu">
        <h1 style="color: var(--primary); letter-spacing: 4px; font-weight: 900; margin-bottom: 5px;">DREAM PUZZLE</h1>
        <p style="color: #94a3b8; margin-bottom: 25px;">Choose your vision</p>
        <div id="level-grid" class="level-grid"></div>
        <button onclick="resetProgress()" style="margin-top: 40px; font-size: 10px; opacity: 0.4;">Reset All Progress</button>
    </div>

    <div class="header">
        <div class="stats-box"><span class="label">Vision</span><span id="lvl-num" class="value">1</span></div>
        <div class="stats-box"><span class="label">Time</span><span id="time-num" class="value">00:00</span></div>
        <div class="stats-box"><span class="label">Moves</span><span id="move-num" class="value">0</span></div>
    </div>

    <div id="board"></div>

    <div id="win-banner">
        <div style="font-weight: 900;">✨ VISION REVEALED ✨</div>
        <div id="rank-text" style="font-size: 12px; color: #a7f3d0;">Rank: Master</div>
    </div>

    <div class="controls">
        <select id="diff-select" onchange="setDifficulty(this.value)">
            <option value="3">Easy (3x3)</option>
            <option value="4" selected>Medium (4x4)</option>
            <option value="5">Hard (5x5)</option>
        </select>
        <button id="ad-btn" onclick="startAdSequence()">📺 Watch Ad for Peek</button>
        <button onclick="goHome()">🏠 Menu</button>
        <button onclick="startLevel()">🔄 Restart</button>
        <button id="next-btn" onclick="nextLevel()">Next Dream ➡️</button>
    </div>

    <script>
        const levels = [
            'https://i.postimg.cc/G2QZ2m2J/dream.png',
            'https://i.postimg.cc/jjvgCG5b/Dream-2.png',
            'https://i.postimg.cc/2jxfHGrw/dream3.png',
            'https://i.postimg.cc/FKR0dDGy/dream4.png'
        ];

        let currentLevel = 0, gridSize = 4, moves = 0, timer = 0, timerInterval;
        let firstTile = null, isWon = false, isActionLocked = false;
        let unlockedLevel = parseInt(localStorage.getItem('dreamPuzzleUnlocked')) || 0;

        const board = document.getElementById('board');
        const moveNum = document.getElementById('move-num');
        const timeNum = document.getElementById('time-num');
        const nextBtn = document.getElementById('next-btn');

        function initMenu() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            document.getElementById('level-menu').style.display = 'flex';
            levels.forEach((img, i) => {
                const card = document.createElement('div');
                card.className = `level-card ${i > unlockedLevel ? 'locked' : ''}`;
                card.innerHTML = i <= unlockedLevel ? `<img src="${img}">` : `<span style="font-size:30px">🔒</span>`;
                card.onclick = () => { if(i <= unlockedLevel) { currentLevel = i; startLevel(); } };
                grid.appendChild(card);
            });
        }

        function startLevel() {
            document.getElementById('level-menu').style.display = 'none';
            board.innerHTML = ''; board.classList.remove('won');
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            moves = 0; isWon = false; isActionLocked = false;
            moveNum.innerText = moves;
            document.getElementById('lvl-num').innerText = currentLevel + 1;
            document.getElementById('win-banner').style.display = 'none';
            nextBtn.style.display = 'none';

            // Timer reset
            clearInterval(timerInterval);
            timer = 0;
            timerInterval = setInterval(() => {
                timer++;
                const m = Math.floor(timer/60).toString().padStart(2,'0');
                const s = (timer%60).toString().padStart(2,'0');
                timeNum.innerText = `${m}:${s}`;
            }, 1000);

            const total = gridSize * gridSize;
            let pieces = Array.from({length: total}, (_, i) => i).sort(() => Math.random() - 0.5);

            pieces.forEach(idx => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.backgroundImage = `url('${levels[currentLevel]}')`;
                tile.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
                updateTileVisuals(tile, idx);
                tile.addEventListener('pointerdown', () => handleTileClick(tile));
                board.appendChild(tile);
            });
            checkCorrectness();
        }

        function handleTileClick(tile) {
            if (isWon || isActionLocked) return;
            if (!firstTile) {
                firstTile = tile; tile.classList.add('selected');
            } else if (firstTile === tile) {
                tile.classList.remove('selected'); firstTile = null;
            } else {
                let tIdx = tile.dataset.idx;
                updateTileVisuals(tile, firstTile.dataset.idx);
                updateTileVisuals(firstTile, tIdx);
                firstTile.classList.remove('selected');
                firstTile = null;
                moves++; moveNum.innerText = moves;
                checkCorrectness();
                checkWin();
            }
        }

        function updateTileVisuals(el, i) {
            el.dataset.idx = i;
            const p = 100 / (gridSize - 1);
            el.style.backgroundPosition = `${(i % gridSize) * p}% ${Math.floor(i / gridSize) * p}%`;
        }

        function checkCorrectness() {
            Array.from(board.children).forEach((t, i) => {
                t.classList.toggle('correct-spot', parseInt(t.dataset.idx) === i);
            });
        }

        function startAdSequence() {
            if (isActionLocked || isWon) return;
            isActionLocked = true;
            const adScreen = document.getElementById('ad-container');
            const adText = document.getElementById('ad-timer-text');
            let timeLeft = 5;
            adScreen.style.display = 'flex';

            const itv = setInterval(() => {
                timeLeft--;
                adText.innerText = `Focusing vision in ${timeLeft}s...`;
                if (timeLeft <= 0) {
                    clearInterval(itv);
                    adScreen.style.display = 'none';
                    triggerTimedPeek();
                }
            }, 1000);
        }

        function triggerTimedPeek() {
            toggleVisualAid(true);
            const btn = document.getElementById('ad-btn');
            btn.disabled = true; btn.innerText = "⏳ PEERING...";

            setTimeout(() => {
                toggleVisualAid(false);
                isActionLocked = false;
                btn.disabled = false; btn.innerText = "📺 Watch Ad for Peek";
            }, 3000);
        }

        function toggleVisualAid(show) {
            Array.from(board.children).forEach(t => {
                t.style.backgroundImage = show ? 'none' : `url('${levels[currentLevel]}')`;
                t.style.backgroundColor = show ? '#1e293b' : 'transparent';
                t.innerHTML = show ? `<div style="display:flex;justify-content:center;align-items:center;height:100%;font-weight:900;color:var(--primary);font-size:20px;">${parseInt(t.dataset.idx)+1}</div>` : '';
            });
        }

        function checkWin() {
            const match = Array.from(board.children).every((t, i) => parseInt(t.dataset.idx) === i);
            if (match) {
                isWon = true; clearInterval(timerInterval);
                board.classList.add('won');
                document.getElementById('win-banner').style.display = 'block';
                if (currentLevel === unlockedLevel && unlockedLevel < levels.length - 1) {
                    unlockedLevel++; localStorage.setItem('dreamPuzzleUnlocked', unlockedLevel);
                }
                if (currentLevel < levels.length - 1) nextBtn.style.display = 'block';
            }
        }

        function setDifficulty(v) { gridSize = parseInt(v); startLevel(); }
        function nextLevel() { currentLevel++; startLevel(); }
        function goHome() { clearInterval(timerInterval); initMenu(); }
        function resetProgress() { if(confirm("Clear dreams?")) { localStorage.clear(); unlockedLevel = 0; initMenu(); } }

        initMenu();
    </script>
</body>
</html>
